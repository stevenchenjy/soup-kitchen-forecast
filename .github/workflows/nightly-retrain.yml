name: Nightly retrain

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Retrain even if attendance has not changed"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run nightly retraining
        run: |
          ARGS="--all"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/nightly_retrain.py $ARGS

      - name: Commit updated models and artifacts
        if: always()
        run: |
          if git diff --quiet -- models artifacts; then
            echo "No model or artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models artifacts
          git commit -m "chore: update nightly trained models"
          git push origin main
